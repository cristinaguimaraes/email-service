name: Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root dependencies
        run: npm ci

      - name: Install web dependencies
        run: npm ci
        working-directory: web

      - name: Run tests
        run: npm test

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Verify S3 access
        run: aws s3 ls    

      - name: Deploy
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: npx sst deploy --stage cristinagferreira --verbose > sst_out.txt 2>&1 || (tail -n 100 sst_out.txt && exit 1)

      - name: Print debug logs on failure
        if: failure()
        run: |
          echo "=== SST log ==="
          cat .sst/log/sst.log || true

          echo "=== Pulumi files ==="
          find .sst/pulumi -type f | sort || true

          echo "=== Pulumi event logs ==="
          find .sst/pulumi -name "eventlog.json" -exec sh -c 'echo "--- {} ---"; cat "{}"; echo' \; || true   